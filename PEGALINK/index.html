<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGASUS Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* 기본 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 63%, #ffffff 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background: rgba(40, 40, 40, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .section {
            margin-bottom: 30px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-align: center; /* middle 대신 center 사용 */
        }

        .profile-img {
            width: 130px; 
            height: 130px;
            border-radius: 50%;
            margin-bottom: -1px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: 2px;
        }

        p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
        }

        .link-button {
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgba(255, 255, 255, 1); /* 깨끗한 화이트 */
    color: #000;
    text-decoration: none;
    margin-bottom: 12px;
    padding: 14px;
    border-radius: 15px;
    font-weight: 700;
    font-size: 0.95rem;
    transition: all 0.25s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.link-button:hover {
    transform: scale(1.02);
    background-color: #f0f0f0;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}
        /* 소셜 아이콘 영역 */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
        }

        .social-icon {
            text-decoration: none;
            font-size: 2.2rem;
            color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        .social-icon.insta:hover { color: #E1306C; transform: translateY(-5px); }
        .social-icon.youtube:hover { color: #FF0000; transform: translateY(-5px); }

        /* 공모전 버튼들 */
        .round-button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .round-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 75px;
            height: 75px;
            background-color: #fff;
            color: #000;
            border-radius: 50%;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .round-button i { font-size: 1.2rem; margin-bottom: 4px; }
        .round-button:hover { background-color: #000; color: #fff; transform: translateY(-5px); }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(120, 120, 120, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="pega_logo.png" alt="Profile" class="profile-img">
        
        <h1>PEGASUS</h1>
        <p>광운대학교 중앙록밴드 동아리</p>

        <div class="social-icons">
            <a href="https://instagram.com/@kw_pegasus" class="social-icon insta" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://youtube.com/@kw_PEGASUS" class="social-icon youtube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
        </div>
        <div class="section">
    <div class="section-title">PEGASUS 둘러보기</div>
    <a href="https://youtube.com/playlist?list=PL3uNA-XitI3EC-_8QyXrA2AotcgobJHR0&si=w6ZZ3iAiWZx0t6Gu" class="link-button" target="_blank">
        <i class="fas fa-play-circle" style="margin-right: 8px;"></i> PEGASUS X 비마응원단
    </a>
    <a href="https://youtube.com/playlist?list=PL3uNA-XitI3HaT0UZ2O0zdm5SeMddVwyo&si=j1S4dYxqznPs6-85" class="link-button" target="_blank">
        <i class="fas fa-play-circle" style="margin-right: 8px;"></i> 2025 정기연주회    </a>
    <a href="https://youtube.com/playlist?list=PL3uNA-XitI3Ggf4ryx-Xrkd3zga9-nflC&si=2iEJ3pT9clBSEzUY" class="link-button" target="_blank">
        <i class="fas fa-play-circle" style="margin-right: 8px;"></i> 2025 축제 AINES : 조각
    </a>
</div>
        <div class="section">
            <div class="section-title">2026 응원가 가사 공모전</div>
            <div class="round-button-group">
                <a href="https://forms.gle/dMnNT9kub6ma5cLFA" target="_blank" class="round-button">
                    <i class="fas fa-file-pen"></i>
                    <span>구글 폼</span>
                </a>
                <a href="https://youtu.be/0nMBXKJzZZ8" target="_blank" class="round-button">
                    <i class="fas fa-music"></i>
                    <span>음원</span>
                </a>
                <a href="https://drive.google.com/file/d/1t1iCHJh_GBgebAPaYnKpgxkWw2sVpgV6/view?usp=drive_link" target="_blank" class="round-button">
                    <i class="fas fa-file-lines"></i>
                    <span>악보</span>
                </a>
            </div>
        </div>

        <div class="footer">© kw_PEGASUS</div>
    </div>

</body>
</html>
