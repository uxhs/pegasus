<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEGASUS Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        /* 기본 레이아웃 */
        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 63%, #ffffff 100%);
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- 별빛 파티클 배경 --- */
        .stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; box-shadow: 0 0 12px white; animation: twinkle 4s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); } 50% { opacity: 0.7; transform: translateY(-40px) scale(1.2); } }
        /* 별 20개 배치 (생략 없이 유지) */
        .star:nth-child(1) { top: 5%; left: 5%; width: 2px; height: 2px; animation-delay: 0s; } .star:nth-child(2) { top: 15%; left: 90%; width: 3px; height: 3px; animation-delay: 0.5s; } .star:nth-child(3) { top: 45%; left: 15%; width: 2px; height: 2px; animation-delay: 1s; } .star:nth-child(4) { top: 75%; left: 80%; width: 4px; height: 4px; animation-delay: 1.5s; } .star:nth-child(5) { top: 25%; left: 40%; width: 1px; height: 1px; animation-delay: 2s; } .star:nth-child(6) { top: 65%; left: 50%; width: 3px; height: 3px; animation-delay: 2.5s; } .star:nth-child(7) { top: 85%; left: 10%; width: 2px; height: 2px; animation-delay: 3s; } .star:nth-child(8) { top: 10%; left: 60%; width: 2px; height: 2px; animation-delay: 0.2s; } .star:nth-child(9) { top: 55%; left: 95%; width: 3px; height: 3px; animation-delay: 0.7s; } .star:nth-child(10) { top: 35%; left: 25%; width: 1px; height: 1px; animation-delay: 1.2s; } .star:nth-child(11) { top: 90%; left: 40%; width: 2px; height: 2px; animation-delay: 1.8s; } .star:nth-child(12) { top: 20%; left: 75%; width: 4px; height: 4px; animation-delay: 2.3s; } .star:nth-child(13) { top: 50%; left: 5%; width: 2px; height: 2px; animation-delay: 2.8s; } .star:nth-child(14) { top: 70%; left: 65%; width: 3px; height: 3px; animation-delay: 3.3s; } .star:nth-child(15) { top: 5%; left: 35%; width: 2px; height: 2px; animation-delay: 3.8s; } .star:nth-child(16) { top: 80%; left: 55%; width: 1px; height: 1px; animation-delay: 0.4s; } .star:nth-child(17) { top: 30%; left: 10%; width: 2px; height: 2px; animation-delay: 1.1s; } .star:nth-child(18) { top: 60%; left: 85%; width: 3px; height: 3px; animation-delay: 2.1s; } .star:nth-child(19) { top: 40%; left: 70%; width: 2px; height: 2px; animation-delay: 3.1s; } .star:nth-child(20) { top: 15%; left: 20%; width: 2px; height: 2px; animation-delay: 4.1s; }

        /* --- 컨테이너 및 공통 스타일 --- */
        .container { width: 90%; max-width: 400px; text-align: center; padding: 40px 20px; background: rgba(40, 40, 40, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1; margin: 40px 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.3s; } .delay-3 { animation-delay: 0.5s; } .delay-4 { animation-delay: 0.7s; }
        .section { margin-bottom: 30px; padding-top: 10px; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .section-title { font-size: 0.9rem; font-weight: 800; color: rgba(255, 255, 255, 0.8); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; margin-bottom: 15px; border: 2px solid rgba(255, 255, 255, 0.3); object-fit: cover; box-shadow: 0 10px 25px rgba(255, 255, 255, 0.15); }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; letter-spacing: 2px; }
        p { font-size: 0.95rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 25px; }
        .link-button { display: flex; align-items: center; justify-content: center; background-color: #ffffff; color: #000; text-decoration: none; margin-bottom: 12px; padding: 14px; border-radius: 15px; font-weight: 700; font-size: 0.95rem; transition: all 0.25s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .link-button:hover { transform: scale(1.02); background-color: #f0f0f0; }
        .social-icons { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
        .social-icon { text-decoration: none; font-size: 2.2rem; color: rgba(255, 255, 255, 0.7); transition: all 0.3s ease; }
        .social-icon.insta:hover { color: #E1306C; transform: translateY(-5px); }
        .social-icon.youtube:hover { color: #FF0000; transform: translateY(-5px); }
        .round-button-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .round-button { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 75px; height: 75px; background-color: #fff; color: #000; border-radius: 50%; text-decoration: none; font-size: 0.75rem; font-weight: 700; transition: all 0.25s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .round-button i { font-size: 1.2rem; margin-bottom: 4px; }
        .round-button:hover { background-color: #000; color: #fff; transform: translateY(-5px); }

        /* --- About PEGASUS 텍스트 박스 --- */
        .about-text { color: rgba(255, 255, 255, 0.85); font-size: 0.9rem; line-height: 1.8; text-align: left; padding: 0 10px; word-break: keep-all; }
        .about-text b { color: #fff; border-bottom: 1px solid rgba(255,255,255,0.4); }

        /* --- 모달 팝업 스타일 --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-content { position: relative; background-color: #1a1a1a; margin: 10% auto; padding: 25px; border: 1px solid rgba(255,255,255,0.15); width: 85%; max-width: 350px; border-radius: 25px; text-align: center; color: white; animation: fadeInUp 0.5s ease-out; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .poster-img { width: 100%; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; right: 20px; top: 15px; color: #fff; font-size: 30px; cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .close-btn:hover { opacity: 1; }
        .modal-text h3 { margin: 10px 0; font-size: 1.25rem; letter-spacing: -0.5px; }
        .modal-text p { font-size: 0.9rem; color: #bbb; margin-bottom: 20px; }

        .footer { margin-top: 30px; font-size: 0.8rem; color: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>

    <div id="noticeModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <img src="poster.jpg" alt="공모전 포스터" class="poster-img">
            <div class="modal-text">
                <h3>2026 응원가 가사 공모전</h3>
                <p>여러분의 가사로 열정적인 응원 문화를 만들어보아요!</p>
                <a href="https://forms.gle/dMnNT9kub6ma5cLFA" target="_blank" class="link-button" style="margin-bottom: 0;">참여하기</a>
            </div>
        </div>
    </div>

    <div class="stars-container">
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div class="container">
        <div class="fade-in delay-1">
            <img src="pega_logo.png" alt="Profile" class="profile-img">
            <h1>PEGASUS</h1>
            <p>광운대학교 중앙록밴드 동아리</p>
        </div>

        <div class="social-icons fade-in delay-2">
            <a href="https://instagram.com/kw_pegasus" class="social-icon insta" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://youtube.com/@kw_PEGASUS" class="social-icon youtube" target="_blank">
                <i class="fab fa-youtube"></i>
            </a>
        </div>

        <div class="section fade-in delay-3">
            <div class="section-title">PEGASUS 둘러보기</div>
            <a href="https://youtube.com/playlist?list=PL3uNA-XitI3EC-_8QyXrA2AotcgobJHR0&si=w6ZZ3iAiWZx0t6Gu" class="link-button" target="_blank">
                <i class="fas fa-play-circle" style="margin-right: 8px;"></i> PEGASUS X 비마응원단
            </a>
            <a href="https://youtube.com/playlist?list=PL3uNA-XitI3HaT0UZ2O0zdm5SeMddVwyo&si=j1S4dYxqznPs6-85" class="link-button" target="_blank">
                <i class="fas fa-play-circle" style="margin-right: 8px;"></i> 2025 정기연주회
            </a>
            <a href="https://youtube.com/playlist?list=PL3uNA-XitI3Ggf4ryx-Xrkd3zga9-nflC&si=2iEJ3pT9clBSEzUY" class="link-button" target="_blank">
                <i class="fas fa-play-circle" style="margin-right: 8px;"></i> 2025 축제 AINES : 조각
            </a>
        </div>
        <div class="section fade-in delay-3">
            <div class="section-title">2026 응원가 가사 공모전</div>
            <div class="round-button-group">
                <a href="https://forms.gle/dMnNT9kub6ma5cLFA" target="_blank" class="round-button">
                    <i class="fas fa-file-pen"></i>
                    <span>구글 폼</span>
                </a>
                <a href="https://youtu.be/0nMBXKJzZZ8" target="_blank" class="round-button">
                    <i class="fas fa-music"></i>
                    <span>음원</span>
                </a>
                <a href="https://drive.google.com/file/d/1t1iCHJh_GBgebAPaYnKpgxkWw2sVpgV6/view?usp=drive_link" target="_blank" class="round-button">
                    <i class="fas fa-file-lines"></i>
                    <span>악보</span>
                </a>
            </div>
        </div>

        <div class="footer fade-in delay-4">© kw_PEGASUS</div>
    </div>

    <script>
        // 모달 제어 자바스크립트
        const modal = document.getElementById("noticeModal");
        const closeBtn = document.querySelector(".close-btn");

        // 페이지 로드 시 0.5초 후 팝업 띄우기 (애니메이션과 조화)
        window.addEventListener('load', () => {
            setTimeout(() => {
                modal.style.display = "block";
            }, 500);
        });

        // 닫기 버튼 클릭 시
        closeBtn.onclick = function() {
            modal.style.display = "none";
        }

        // 팝업 바깥 영역 클릭 시 닫기
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
